<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飲品團購 🧃</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #fdf6ec;
    --surface: #ffffff;
    --surface2: #fff9f0;
    --accent: #ff6b35;
    --text: #1a1a1a;
    --text2: #6b6b6b;
    --border: #f0e0cc;
    --shadow: 0 4px 24px rgba(255,107,53,0.10);
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans HK', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 80px;
  }

  header {
    background: var(--accent);
    padding: 28px 24px 22px;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    right: -40px; top: -40px;
    width: 180px; height: 180px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
  }
  .header-inner { max-width: 680px; margin: 0 auto; position: relative; z-index: 1; }
  header h1 { font-size: 26px; font-weight: 900; color: #fff; letter-spacing: -0.5px; }
  header p { color: rgba(255,255,255,0.80); font-size: 13px; margin-top: 4px; }
  .badges { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .round-badge {
    display: inline-block;
    background: rgba(255,255,255,0.20);
    color: #fff; font-size: 12px; font-weight: 700;
    padding: 3px 10px; border-radius: 20px;
  }
  .live-dot {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(255,255,255,0.15);
    color: #fff; font-size: 11px; font-weight: 600;
    padding: 3px 10px; border-radius: 20px;
  }
  .live-dot::before {
    content: '';
    width: 6px; height: 6px;
    background: #4cff91; border-radius: 50%;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .main { max-width: 680px; margin: 0 auto; padding: 24px 16px 0; }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    padding: 20px; margin-bottom: 20px;
    box-shadow: var(--shadow);
  }
  .card-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

  .api-setup {
    background: #f0f7ff; border: 1.5px solid #b3d4f5;
    border-radius: var(--radius); padding: 14px 18px;
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .api-setup label { color: #1565c0; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; white-space: nowrap; margin: 0; }
  .api-setup input {
    flex: 1; min-width: 180px; padding: 8px 12px;
    border: 1.5px solid #b3d4f5; border-radius: 8px;
    font-size: 13px; font-family: monospace;
    background: #fff; color: #1a1a1a; outline: none;
  }
  .api-setup input:focus { border-color: #1976d2; }
  .btn-save-key {
    background: #1976d2; color: #fff; border: none; border-radius: 8px;
    padding: 8px 14px; font-size: 13px; font-weight: 700;
    cursor: pointer; font-family: inherit; white-space: nowrap;
  }
  .btn-save-key:hover { background: #1565c0; }
  .key-status { font-size: 12px; color: #388e3c; font-weight: 600; }
  .key-link { font-size: 12px; color: #1976d2; text-decoration: none; }
  .key-link:hover { text-decoration: underline; }

  .form-row { display: flex; gap: 10px; margin-bottom: 10px; }
  .form-row.stacked { flex-direction: column; }
  label { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; display: block; }
  input[type="text"], input[type="url"] {
    width: 100%; padding: 11px 14px;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-size: 14px; font-family: inherit;
    background: var(--surface2); color: var(--text); outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); background: #fff; }
  input::placeholder { color: #bbb; }

  .qty-wrap {
    display: flex; align-items: center;
    border: 1.5px solid var(--border); border-radius: 10px;
    overflow: hidden; background: var(--surface2);
    width: 110px; flex-shrink: 0;
  }
  .qty-btn {
    background: none; border: none; cursor: pointer;
    width: 36px; height: 44px; font-size: 18px;
    color: var(--accent); font-weight: 700; transition: background 0.15s;
  }
  .qty-btn:hover { background: rgba(255,107,53,0.08); }
  #qty-input {
    width: 38px; border: none; background: none;
    text-align: center; font-size: 15px; font-weight: 700;
    padding: 0; color: var(--text); outline: none;
  }

  .btn-add {
    width: 100%; background: var(--accent); color: #fff;
    border: none; border-radius: 10px; padding: 13px;
    font-size: 15px; font-weight: 700; font-family: inherit;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; gap: 8px;
    transition: background 0.18s, transform 0.1s;
  }
  .btn-add:hover { background: #e55a27; }
  .btn-add:active { transform: scale(0.98); }
  .btn-add:disabled { background: #ccc; cursor: not-allowed; }

  .loading-bar {
    display: none; align-items: center; gap: 10px;
    padding: 12px 14px; background: #fff8f0;
    border-radius: 10px; margin-top: 10px;
    font-size: 13px; color: var(--accent); font-weight: 600;
  }
  .loading-bar.show { display: flex; }
  .spinner {
    width: 18px; height: 18px;
    border: 2.5px solid rgba(255,107,53,0.2);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.7s linear infinite; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg {
    display: none; padding: 10px 14px;
    background: #fff0f0; border-radius: 10px; margin-top: 10px;
    font-size: 13px; color: #e53935; font-weight: 500;
  }
  .error-msg.show { display: block; }

  .summary-bar {
    background: linear-gradient(135deg, var(--accent) 0%, #ff8c5a 100%);
    border-radius: var(--radius); padding: 16px 20px; margin-bottom: 20px;
    display: flex; align-items: center; justify-content: space-between;
    color: #fff; box-shadow: 0 6px 20px rgba(255,107,53,0.25);
  }
  .summary-bar .label { font-size: 13px; opacity: 0.85; }
  .summary-bar .total { font-size: 26px; font-weight: 900; letter-spacing: -1px; }
  .summary-stats { display: flex; gap: 20px; }
  .stat { text-align: center; }
  .stat .val { font-size: 18px; font-weight: 800; }
  .stat .lbl { font-size: 11px; opacity: 0.75; margin-top: 2px; }
  .divider-v { width: 1px; background: rgba(255,255,255,0.3); }

  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .section-title { font-size: 15px; font-weight: 800; }
  .btn-copy {
    font-size: 12px; font-weight: 600; color: var(--accent);
    background: rgba(255,107,53,0.08); border: none;
    border-radius: 8px; padding: 5px 12px; cursor: pointer;
    font-family: inherit; transition: background 0.15s;
  }
  .btn-copy:hover { background: rgba(255,107,53,0.15); }
  .btn-clear {
    font-size: 12px; font-weight: 600; color: #aaa;
    background: none; border: 1px solid #e0e0e0; border-radius: 8px;
    padding: 5px 12px; cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .btn-clear:hover { color: #e53935; border-color: #e53935; background: #fff0f0; }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--text2); font-size: 14px; }
  .empty-state .emoji { font-size: 40px; margin-bottom: 10px; }

  .person-group { margin-bottom: 16px; animation: fadeIn 0.35s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .person-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    font-size: 13px; font-weight: 800; color: #fff;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .person-name { font-size: 14px; font-weight: 700; }
  .person-subtotal { margin-left: auto; font-size: 13px; font-weight: 700; color: var(--accent); }

  .item-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 12px 14px;
    display: flex; align-items: flex-start; gap: 12px;
    margin-bottom: 8px; transition: box-shadow 0.2s;
  }
  .item-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .item-img {
    width: 56px; height: 56px; border-radius: 8px;
    object-fit: cover; background: #f5f5f5;
    flex-shrink: 0; border: 1px solid #eee;
  }
  .img-placeholder {
    width: 56px; height: 56px; border-radius: 8px;
    background: linear-gradient(135deg, #ffe0cc, #ffd0b0);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; flex-shrink: 0;
  }
  .item-info { flex: 1; min-width: 0; }
  .item-name {
    font-size: 13px; font-weight: 600; line-height: 1.4; margin-bottom: 4px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .item-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .item-price { font-size: 15px; font-weight: 800; color: var(--accent); }
  .item-qty-badge {
    font-size: 11px; font-weight: 700;
    background: var(--surface2); color: var(--text2);
    padding: 2px 8px; border-radius: 20px; border: 1px solid var(--border);
  }
  .item-total { font-size: 12px; color: var(--text2); }
  .item-link { font-size: 11px; color: var(--accent); text-decoration: none; opacity: 0.7; }
  .item-link:hover { opacity: 1; text-decoration: underline; }
  .btn-remove {
    background: none; border: none; cursor: pointer;
    color: #ccc; font-size: 16px; padding: 2px 4px;
    border-radius: 6px; transition: color 0.15s, background 0.15s;
    flex-shrink: 0; line-height: 1; margin-top: 2px;
  }
  .btn-remove:hover { color: #e53935; background: #fff0f0; }

  .color-0 { background: #ff6b35; }
  .color-1 { background: #4caf7d; }
  .color-2 { background: #2196f3; }
  .color-3 { background: #9c27b0; }
  .color-4 { background: #ff9800; }
  .color-5 { background: #e91e63; }
  .color-6 { background: #00bcd4; }
  .color-7 { background: #795548; }

  .toast {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #222; color: #fff;
    padding: 10px 20px; border-radius: 30px;
    font-size: 13px; font-weight: 600;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 999; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 480px) {
    header h1 { font-size: 22px; }
    .summary-stats { gap: 12px; }
    .summary-bar .total { font-size: 22px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="badges">
      <span class="round-badge">🧃 公司團購</span>
      <span class="live-dot">即時同步</span>
    </div>
    <h1>飲品訂購清單</h1>
    <p>貼上 HKTVmall 連結，自動抓取產品資訊</p>
  </div>
</header>

<div class="main">

  <!-- GEMINI API KEY -->
  <div class="api-setup" id="api-setup">
    <label>🔑 Gemini Key</label>
    <input type="password" id="api-key-input" placeholder="AIza..." autocomplete="off">
    <button class="btn-save-key" onclick="saveKey()">儲存</button>
    <span class="key-status" id="key-status"></span>
    <a class="key-link" href="https://aistudio.google.com/app/apikey" target="_blank">免費攞 Key →</a>
  </div>

  <!-- ADD FORM -->
  <div class="card">
    <div class="card-title"><span>➕</span> 加落單</div>
    <div class="form-row stacked">
      <label for="name-input">你的名字</label>
      <input type="text" id="name-input" placeholder="例：阿明、Tracy..." maxlength="20">
    </div>
    <div class="form-row stacked" style="margin-top:10px">
      <label for="url-input">HKTVmall 產品連結</label>
      <input type="url" id="url-input" placeholder="https://www.hktvmall.com/hktv/zh/...">
    </div>
    <div class="form-row" style="align-items:flex-end; margin-top:10px; margin-bottom:12px">
      <div style="flex:1"></div>
      <div>
        <label>數量</label>
        <div class="qty-wrap">
          <button class="qty-btn" onclick="changeQty(-1)">−</button>
          <input type="text" id="qty-input" value="1" readonly>
          <button class="qty-btn" onclick="changeQty(1)">+</button>
        </div>
      </div>
    </div>
    <button class="btn-add" id="add-btn" onclick="addOrder()">
      <span id="btn-text">🔍 搵產品資訊 &amp; 加落單</span>
    </button>
    <div class="loading-bar" id="loading-bar">
      <div class="spinner"></div>
      <span>正在搵緊產品資訊...</span>
    </div>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <!-- SUMMARY -->
  <div class="summary-bar" id="summary-bar" style="display:none">
    <div>
      <div class="label">今期總金額</div>
      <div class="total" id="total-amount">HK$0</div>
    </div>
    <div class="summary-stats">
      <div class="stat">
        <div class="val" id="stat-items">0</div>
        <div class="lbl">件產品</div>
      </div>
      <div class="divider-v"></div>
      <div class="stat">
        <div class="val" id="stat-people">0</div>
        <div class="lbl">位同事</div>
      </div>
    </div>
  </div>

  <!-- ORDER LIST -->
  <div id="orders-section" style="display:none">
    <div class="section-header">
      <div class="section-title">📋 落單紀錄</div>
      <div style="display:flex;gap:8px">
        <button class="btn-copy" onclick="copyList()">📋 複製清單</button>
        <button class="btn-clear" onclick="clearAll()">清除全部</button>
      </div>
    </div>
    <div id="orders-container"></div>
  </div>

  <div class="empty-state" id="empty-state">
    <div class="emoji">🧋</div>
    <div>未有人落單</div>
    <div style="font-size:12px;margin-top:4px;color:#bbb">貼上 HKTVmall 連結即可開始</div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── SUPABASE ──
const SUPABASE_URL = 'https://tlmkopdfrhgndkjqrbhv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_a0cbx2oNEfR3uiFVG7vvIw_AjbVaYZx';
const TABLE = 'drink_orders';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── STATE ──
let orders = [];
let qty = 1;

// ── QTY ──
function changeQty(delta) {
  qty = Math.max(1, Math.min(99, qty + delta));
  document.getElementById('qty-input').value = qty;
}

// ── LOAD FROM SUPABASE ──
async function loadOrders() {
  const { data, error } = await db
    .from(TABLE)
    .select('*')
    .order('created_at', { ascending: true });
  if (error) { console.error(error); return; }
  orders = data || [];
  render();
}

// ── REALTIME ──
function subscribeRealtime() {
  db.channel('drink_orders_channel')
    .on('postgres_changes', { event: '*', schema: 'public', table: TABLE }, () => {
      loadOrders();
    })
    .subscribe();
}

// ── ADD ORDER ──
async function addOrder() {
  const name = document.getElementById('name-input').value.trim();
  const url  = document.getElementById('url-input').value.trim();
  document.getElementById('error-msg').className = 'error-msg';

  if (!name) return showError('請先輸入你的名字 👤');
  if (!url)  return showError('請貼上 HKTVmall 產品連結 🔗');
  if (!url.includes('hktvmall')) return showError('請貼上正確嘅 HKTVmall 連結');

  setLoading(true);
  try {
    const product = await fetchProductInfo(url);
    const { error } = await db.from(TABLE).insert({ person_name: name, product, qty, url });
    if (error) throw new Error('儲存失敗：' + error.message);
    document.getElementById('url-input').value = '';
    qty = 1;
    document.getElementById('qty-input').value = 1;
    showToast('✅ 已加落單！');
  } catch(e) {
    showError(e.message);
  } finally {
    setLoading(false);
  }
}

// ── REMOVE ──
async function removeOrder(id) {
  const { error } = await db.from(TABLE).delete().eq('id', id);
  if (error) showToast('❌ 移除失敗');
}

// ── CLEAR ALL ──
async function clearAll() {
  if (!confirm('確定清除所有落單紀錄？')) return;
  const { error } = await db.from(TABLE).delete().neq('id', 0);
  if (error) showToast('❌ 清除失敗');
}

// ── GEMINI KEY ──
function saveKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) return;
  localStorage.setItem('gemini_key', key);
  updateKeyStatus();
  showToast('🔑 API Key 已儲存');
}
function getKey() { return localStorage.getItem('gemini_key') || ''; }
function updateKeyStatus() {
  const key = getKey();
  const el = document.getElementById('key-status');
  const setup = document.getElementById('api-setup');
  if (key) {
    el.textContent = '✅ 已設定';
    setup.style.borderColor = '#a5d6a7';
    setup.style.background = '#f1f8f1';
  } else {
    el.textContent = '';
    setup.style.borderColor = '#b3d4f5';
    setup.style.background = '#f0f7ff';
  }
}

// ── FETCH PRODUCT VIA GEMINI ──
async function fetchProductInfo(url) {
  const key = getKey();
  if (!key) throw new Error('請先輸入並儲存 Gemini API Key');

  const prompt = `請幫我查詢以下 HKTVmall 產品連結的資訊：
${url}

用 Google Search 搵到以下資訊，然後只回覆一個 JSON object，不要有任何其他文字、解釋或 markdown backtick：
{"name":"產品中文或英文名稱（完整名稱）","price":數字價錢只要數字,"unit":"件或盒或包或支等單位","image":"產品圖片URL如搵唔到就空字串","brand":"品牌名稱如有"}
price 搵唔到就用 0，image 搵唔到就用空字串。`;

  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        tools: [{ google_search: {} }],
        contents: [{ role: 'user', parts: [{ text: prompt }] }],
        generationConfig: { temperature: 0.1, maxOutputTokens: 1000 }
      })
    }
  );

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    const msg = err.error?.message || `API error ${res.status}`;
    if (res.status === 400) throw new Error('API Key 無效，請檢查');
    if (res.status === 429) throw new Error('超過 API 使用限額，請稍後再試');
    throw new Error(msg);
  }

  const data = await res.json();
  const fullText = data.candidates?.[0]?.content?.parts
    ?.filter(p => p.text)?.map(p => p.text)?.join('') || '';
  const jsonMatch = fullText.match(/\{[\s\S]*?\}/);
  if (!jsonMatch) throw new Error('未能解析產品資訊，請重試');
  return JSON.parse(jsonMatch[0].replace(/```json|```/g, '').trim());
}

// ── RENDER ──
const COLORS = ['color-0','color-1','color-2','color-3','color-4','color-5','color-6','color-7'];

function render() {
  const container = document.getElementById('orders-container');
  const emptyState = document.getElementById('empty-state');
  const ordersSection = document.getElementById('orders-section');
  const summaryBar = document.getElementById('summary-bar');

  if (orders.length === 0) {
    emptyState.style.display = 'block';
    ordersSection.style.display = 'none';
    summaryBar.style.display = 'none';
    return;
  }

  emptyState.style.display = 'none';
  ordersSection.style.display = 'block';
  summaryBar.style.display = 'flex';

  const byPerson = {}, personOrder = [], personIndex = {};
  let colorIdx = 0;
  for (const o of orders) {
    if (!byPerson[o.person_name]) {
      byPerson[o.person_name] = [];
      personOrder.push(o.person_name);
      personIndex[o.person_name] = colorIdx++ % COLORS.length;
    }
    byPerson[o.person_name].push(o);
  }

  let grandTotal = 0, totalItems = 0;
  for (const o of orders) { grandTotal += (o.product.price || 0) * o.qty; totalItems += o.qty; }

  document.getElementById('total-amount').textContent = 'HK$' + grandTotal.toFixed(1);
  document.getElementById('stat-items').textContent = totalItems;
  document.getElementById('stat-people').textContent = personOrder.length;

  container.innerHTML = '';
  for (const person of personOrder) {
    const pOrders = byPerson[person];
    const subtotal = pOrders.reduce((s, o) => s + (o.product.price || 0) * o.qty, 0);
    const colorClass = COLORS[personIndex[person]];
    const group = document.createElement('div');
    group.className = 'person-group';
    group.innerHTML = `
      <div class="person-header">
        <div class="avatar ${colorClass}">${escHtml(person.charAt(0).toUpperCase())}</div>
        <div class="person-name">${escHtml(person)}</div>
        <div class="person-subtotal">HK$${subtotal.toFixed(1)}</div>
      </div>
      ${pOrders.map(renderItem).join('')}
    `;
    container.appendChild(group);
  }
}

function renderItem(o) {
  const p = o.product;
  const lineTotal = (p.price || 0) * o.qty;
  const imgHtml = p.image
    ? `<img class="item-img" src="${escHtml(p.image)}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="img-placeholder" style="display:none">🧃</div>`
    : `<div class="img-placeholder">🧃</div>`;
  return `
    <div class="item-card">
      ${imgHtml}
      <div class="item-info">
        <div class="item-name">${escHtml(p.name || '未知產品')}</div>
        <div class="item-meta">
          <span class="item-price">${p.price ? 'HK$' + p.price : '價格未知'}</span>
          <span class="item-qty-badge">× ${o.qty}${p.unit || ''}</span>
          ${o.qty > 1 ? `<span class="item-total">= HK$${lineTotal.toFixed(1)}</span>` : ''}
        </div>
        <div style="margin-top:4px">
          <a class="item-link" href="${escHtml(o.url)}" target="_blank">🔗 HKTVmall</a>
          ${p.brand ? `<span style="font-size:11px;color:#aaa;margin-left:8px">${escHtml(p.brand)}</span>` : ''}
        </div>
      </div>
      <button class="btn-remove" onclick="removeOrder(${o.id})" title="移除">✕</button>
    </div>
  `;
}

// ── COPY LIST ──
function copyList() {
  const byPerson = {}, personOrder = [];
  for (const o of orders) {
    if (!byPerson[o.person_name]) { byPerson[o.person_name] = []; personOrder.push(o.person_name); }
    byPerson[o.person_name].push(o);
  }
  let text = '🧃 飲品團購清單\n━━━━━━━━━━━━━━━━━━━━\n';
  let grand = 0;
  for (const person of personOrder) {
    text += `\n👤 ${person}\n`;
    for (const o of byPerson[person]) {
      const line = (o.product.price || 0) * o.qty;
      grand += line;
      text += `  • ${o.product.name || '未知產品'} × ${o.qty}`;
      if (o.product.price) text += ` (HK$${line.toFixed(1)})`;
      text += '\n';
    }
    const sub = byPerson[person].reduce((s, o) => s + (o.product.price || 0) * o.qty, 0);
    text += `  小計：HK$${sub.toFixed(1)}\n`;
  }
  text += `\n━━━━━━━━━━━━━━━━━━━━\n💰 總計：HK$${grand.toFixed(1)}\n`;
  navigator.clipboard.writeText(text).then(() => showToast('📋 已複製到剪貼板！'));
}

// ── HELPERS ──
function setLoading(on) {
  document.getElementById('add-btn').disabled = on;
  document.getElementById('btn-text').textContent = on ? '搜尋緊...' : '🔍 搵產品資訊 & 加落單';
  document.getElementById('loading-bar').className = 'loading-bar' + (on ? ' show' : '');
}
function showError(msg) {
  const el = document.getElementById('error-msg');
  el.innerHTML = '⚠️ ' + msg;
  el.className = 'error-msg show';
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  setTimeout(() => t.className = 'toast', 2500);
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('url-input').addEventListener('keydown', e => { if (e.key === 'Enter') addOrder(); });
  document.getElementById('api-key-input').addEventListener('keydown', e => { if (e.key === 'Enter') saveKey(); });
  updateKeyStatus();
  loadOrders();
  subscribeRealtime();
});
</script>
