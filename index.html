<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飲品團購 🧃</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #fdf6ec; --surface: #ffffff; --surface2: #fff9f0;
    --accent: #ff6b35; --text: #1a1a1a; --text2: #6b6b6b;
    --border: #f0e0cc; --shadow: 0 4px 24px rgba(255,107,53,0.10); --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans HK', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 0 0 80px; }

  header { background: var(--accent); padding: 28px 24px 22px; position: relative; overflow: hidden; }
  header::before { content: ''; position: absolute; right: -40px; top: -40px; width: 180px; height: 180px; background: rgba(255,255,255,0.08); border-radius: 50%; }
  .header-inner { max-width: 680px; margin: 0 auto; position: relative; z-index: 1; }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; }
  header h1 { font-size: 26px; font-weight: 900; color: #fff; letter-spacing: -0.5px; margin-top: 6px; }
  header p { color: rgba(255,255,255,0.80); font-size: 13px; margin-top: 4px; }
  .badges { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
  .round-badge { display: inline-block; background: rgba(255,255,255,0.20); color: #fff; font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
  .live-dot { display: inline-flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.15); color: #fff; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
  .live-dot::before { content: ''; width: 6px; height: 6px; background: #4cff91; border-radius: 50%; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .btn-settings { background: rgba(255,255,255,0.18); border: 1.5px solid rgba(255,255,255,0.3); color: #fff; border-radius: 10px; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; transition: background 0.2s; flex-shrink: 0; margin-top: 2px; }
  .btn-settings:hover { background: rgba(255,255,255,0.28); }
  .key-indicator { font-size: 10px; color: rgba(255,255,255,0.7); margin-top: 4px; text-align: center; }
  .key-indicator.set { color: #a8ffce; }

  /* MODALS */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.show { display: flex; }
  .modal { background: #fff; border-radius: 20px; padding: 24px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); animation: modalIn 0.25s cubic-bezier(0.34,1.56,0.64,1); }
  .modal.wide { max-width: 520px; }
  .modal.history-modal { max-height: 80vh; display: flex; flex-direction: column; }
  @keyframes modalIn { from{opacity:0;transform:scale(0.92) translateY(10px)} to{opacity:1;transform:scale(1) translateY(0)} }
  .modal-title { font-size: 17px; font-weight: 900; margin-bottom: 18px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .btn-modal-close { background: #f5f5f5; border: none; border-radius: 8px; width: 30px; height: 30px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: #888; }
  .btn-modal-close:hover { background: #eee; color: #333; }
  .modal-label { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .modal-input-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .modal-input-row input { flex: 1; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 13px; font-family: monospace; background: var(--surface2); outline: none; }
  .modal-input-row input:focus { border-color: var(--accent); background: #fff; }
  .btn-modal-save { background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 10px 16px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; }
  .btn-modal-save:hover { background: #e55a27; }
  .modal-hint { font-size: 12px; color: var(--text2); display: flex; align-items: center; justify-content: space-between; }
  .modal-hint a { color: var(--accent); text-decoration: none; font-weight: 600; }
  .modal-hint a:hover { text-decoration: underline; }
  .key-saved-msg { font-size: 12px; color: #388e3c; font-weight: 600; }

  /* CONFIRM MODAL */
  .confirm-inner { text-align: center; }
  .confirm-icon { font-size: 36px; margin-bottom: 10px; }
  .confirm-msg { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
  .confirm-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; line-height: 1.5; }
  .confirm-btns { display: flex; gap: 10px; }
  .btn-confirm-cancel { flex: 1; padding: 11px; background: #f5f5f5; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .btn-confirm-cancel:hover { background: #eee; }
  .btn-confirm-ok { flex: 1; padding: 11px; background: #e53935; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; color: #fff; }
  .btn-confirm-ok:hover { background: #c62828; }

  /* ARCHIVE MODAL */
  .archive-input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; font-family: inherit; background: var(--surface2); outline: none; margin-bottom: 12px; }
  .archive-input:focus { border-color: var(--accent); background: #fff; }
  .btn-archive-save { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background 0.15s; }
  .btn-archive-save:hover { background: #e55a27; }
  .archive-preview { background: var(--surface2); border-radius: 10px; padding: 12px 14px; margin-bottom: 14px; font-size: 13px; color: var(--text2); }
  .archive-preview strong { color: var(--text); font-weight: 700; }

  /* HISTORY */
  .history-scroll { overflow-y: auto; flex: 1; }
  .history-empty { text-align: center; padding: 30px; color: var(--text2); font-size: 14px; }
  .history-empty .emoji { font-size: 36px; margin-bottom: 8px; }
  .archive-card { border: 1.5px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; }
  .archive-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 4px; }
  .archive-name { font-size: 14px; font-weight: 800; }
  .archive-date { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .archive-right { text-align: right; flex-shrink: 0; margin-left: 10px; }
  .archive-total { font-size: 15px; font-weight: 800; color: var(--accent); }
  .archive-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .archive-actions { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .btn-archive-expand { font-size: 12px; color: var(--accent); background: rgba(255,107,53,0.08); border: none; border-radius: 8px; padding: 4px 10px; cursor: pointer; font-family: inherit; font-weight: 600; }
  .btn-archive-expand:hover { background: rgba(255,107,53,0.15); }
  .btn-archive-del { font-size: 12px; color: #bbb; background: none; border: 1px solid #eee; border-radius: 8px; padding: 4px 10px; cursor: pointer; font-family: inherit; font-weight: 600; }
  .btn-archive-del:hover { color: #e53935; border-color: #ffcdd2; background: #fff0f0; }
  .archive-detail { display: none; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
  .archive-detail.open { display: block; }
  .archive-person-name { font-size: 12px; font-weight: 800; color: var(--text); margin-top: 8px; margin-bottom: 2px; }
  .archive-person-name:first-child { margin-top: 0; }
  .archive-item-row { font-size: 12px; color: var(--text2); padding: 2px 0 2px 8px; }
  .archive-person-sub { font-size: 12px; color: var(--accent); font-weight: 700; padding-left: 8px; margin-top: 2px; }

  /* SECTION BUTTONS */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
  .section-title { font-size: 15px; font-weight: 800; }
  .section-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .btn-copy { font-size: 12px; font-weight: 600; color: var(--accent); background: rgba(255,107,53,0.08); border: none; border-radius: 8px; padding: 5px 10px; cursor: pointer; font-family: inherit; transition: background 0.15s; }
  .btn-copy:hover { background: rgba(255,107,53,0.15); }
  .btn-archive-round { font-size: 12px; font-weight: 700; color: #fff; background: var(--accent); border: none; border-radius: 8px; padding: 5px 10px; cursor: pointer; font-family: inherit; transition: background 0.15s; }
  .btn-archive-round:hover { background: #e55a27; }
  .btn-history-view { font-size: 12px; font-weight: 600; color: var(--text2); background: none; border: 1px solid #e0e0e0; border-radius: 8px; padding: 5px 10px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .btn-history-view:hover { border-color: var(--accent); color: var(--accent); }
  .btn-clear { font-size: 12px; font-weight: 600; color: #bbb; background: none; border: 1px solid #eee; border-radius: 8px; padding: 5px 10px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .btn-clear:hover { color: #e53935; border-color: #ffcdd2; background: #fff0f0; }

  .main { max-width: 680px; margin: 0 auto; padding: 24px 16px 0; }
  .card { background: var(--surface); border-radius: var(--radius); border: 1.5px solid var(--border); padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow); }
  .card-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

  .form-row { display: flex; gap: 10px; margin-bottom: 10px; }
  .form-row.stacked { flex-direction: column; }
  label { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; display: block; }
  input[type="text"], input[type="url"] { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; font-family: inherit; background: var(--surface2); color: var(--text); outline: none; transition: border-color 0.2s; }
  input:focus { border-color: var(--accent); background: #fff; }
  input::placeholder { color: #bbb; }

  .qty-wrap { display: flex; align-items: center; border: 1.5px solid var(--border); border-radius: 10px; overflow: hidden; background: var(--surface2); width: 110px; flex-shrink: 0; }
  .qty-btn { background: none; border: none; cursor: pointer; width: 36px; height: 44px; font-size: 18px; color: var(--accent); font-weight: 700; transition: background 0.15s; }
  .qty-btn:hover { background: rgba(255,107,53,0.08); }
  #qty-input { width: 38px; border: none; background: none; text-align: center; font-size: 15px; font-weight: 700; padding: 0; color: var(--text); outline: none; }

  .btn-add { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.18s, transform 0.1s; }
  .btn-add:hover { background: #e55a27; }
  .btn-add:active { transform: scale(0.98); }
  .btn-add:disabled { background: #ccc; cursor: not-allowed; }

  .loading-bar { display: none; align-items: center; gap: 10px; padding: 12px 14px; background: #fff8f0; border-radius: 10px; margin-top: 10px; font-size: 13px; color: var(--accent); font-weight: 600; }
  .loading-bar.show { display: flex; }
  .spinner { width: 18px; height: 18px; border: 2.5px solid rgba(255,107,53,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .error-msg { display: none; padding: 10px 14px; background: #fff0f0; border-radius: 10px; margin-top: 10px; font-size: 13px; color: #e53935; font-weight: 500; }
  .error-msg.show { display: block; }

  .summary-bar { background: linear-gradient(135deg, var(--accent) 0%, #ff8c5a 100%); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; color: #fff; box-shadow: 0 6px 20px rgba(255,107,53,0.25); }
  .summary-bar .label { font-size: 13px; opacity: 0.85; }
  .summary-bar .total { font-size: 26px; font-weight: 900; letter-spacing: -1px; }
  .summary-stats { display: flex; gap: 20px; }
  .stat { text-align: center; }
  .stat .val { font-size: 18px; font-weight: 800; }
  .stat .lbl { font-size: 11px; opacity: 0.75; margin-top: 2px; }
  .divider-v { width: 1px; background: rgba(255,255,255,0.3); }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--text2); font-size: 14px; }
  .empty-state .emoji { font-size: 40px; margin-bottom: 10px; }

  .person-group { margin-bottom: 16px; animation: fadeIn 0.35s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .person-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; font-size: 13px; font-weight: 800; color: #fff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .person-name { font-size: 14px; font-weight: 700; }
  .person-subtotal { margin-left: auto; font-size: 13px; font-weight: 700; color: var(--accent); }

  .item-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 14px; display: flex; align-items: flex-start; gap: 12px; margin-bottom: 8px; transition: box-shadow 0.2s; }
  .item-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .item-img { width: 56px; height: 56px; border-radius: 8px; object-fit: cover; background: #f5f5f5; flex-shrink: 0; border: 1px solid #eee; }
  .img-placeholder { width: 56px; height: 56px; border-radius: 8px; background: linear-gradient(135deg, #ffe0cc, #ffd0b0); display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 13px; font-weight: 600; line-height: 1.4; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .item-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .item-price { font-size: 15px; font-weight: 800; color: var(--accent); }
  .item-qty-badge { font-size: 11px; font-weight: 700; background: var(--surface2); color: var(--text2); padding: 2px 8px; border-radius: 20px; border: 1px solid var(--border); }
  .item-total { font-size: 12px; color: var(--text2); }
  .item-link { font-size: 11px; color: var(--accent); text-decoration: none; opacity: 0.7; }
  .item-link:hover { opacity: 1; text-decoration: underline; }
  .btn-remove { background: none; border: none; cursor: pointer; color: #ccc; font-size: 16px; padding: 2px 4px; border-radius: 6px; transition: color 0.15s, background 0.15s; flex-shrink: 0; line-height: 1; margin-top: 2px; }
  .btn-remove:hover { color: #e53935; background: #fff0f0; }

  .color-0{background:#ff6b35} .color-1{background:#4caf7d} .color-2{background:#2196f3}
  .color-3{background:#9c27b0} .color-4{background:#ff9800} .color-5{background:#e91e63}
  .color-6{background:#00bcd4} .color-7{background:#795548}

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px); background: #222; color: #fff; padding: 10px 20px; border-radius: 30px; font-size: 13px; font-weight: 600; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 1100; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 480px) { header h1{font-size:22px} .summary-stats{gap:12px} .summary-bar .total{font-size:22px} }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-top">
      <div>
        <div class="badges">
          <span class="round-badge">🧃 公司團購</span>
          <span class="live-dot">即時同步</span>
        </div>
        <h1>飲品訂購清單</h1>
        <p>貼上 HKTVmall 連結，自動抓取產品資訊</p>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
        <button class="btn-settings" onclick="openSettings()">⚙️</button>
        <div class="key-indicator" id="key-indicator">未設定</div>
      </div>
    </div>
  </div>
</header>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settings-modal" onclick="handleOverlayClick(event,'settings-modal')">
  <div class="modal">
    <div class="modal-title">⚙️ 設定 <button class="btn-modal-close" onclick="closeModal('settings-modal')">✕</button></div>
    <div class="modal-label">Gemini API Key（用作備用）</div>
    <div class="modal-input-row">
      <input type="password" id="api-key-input" placeholder="AIza..." autocomplete="off">
      <button class="btn-modal-save" onclick="saveKey()">儲存</button>
    </div>
    <div class="modal-hint">
      <span id="key-saved-msg" class="key-saved-msg"></span>
      <a href="https://aistudio.google.com/app/apikey" target="_blank">免費攞 Key →</a>
    </div>
    <button id="btn-delete-key" onclick="deleteKey()" style="display:none;margin-top:12px;width:100%;padding:9px;background:none;border:1.5px solid #ffcdd2;border-radius:10px;color:#e53935;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">🗑️ 刪除 API Key</button>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal" style="max-width:320px">
    <div class="confirm-inner">
      <div class="confirm-icon" id="confirm-icon">⚠️</div>
      <div class="confirm-msg" id="confirm-msg"></div>
      <div class="confirm-sub" id="confirm-sub"></div>
      <div class="confirm-btns">
        <button class="btn-confirm-cancel" onclick="confirmResolve(false)">取消</button>
        <button class="btn-confirm-ok" id="confirm-ok-btn" onclick="confirmResolve(true)">確定刪除</button>
      </div>
    </div>
  </div>
</div>

<!-- ARCHIVE MODAL -->
<div class="modal-overlay" id="archive-modal" onclick="handleOverlayClick(event,'archive-modal')">
  <div class="modal wide">
    <div class="modal-title">📦 結單存檔 <button class="btn-modal-close" onclick="closeModal('archive-modal')">✕</button></div>
    <div class="archive-preview" id="archive-preview"></div>
    <div class="modal-label">為今期命名</div>
    <input type="text" class="archive-input" id="archive-name-input" placeholder="例：2026年4月第一期、4月初...">
    <button class="btn-archive-save" onclick="saveArchive()">💾 儲存存檔</button>
  </div>
</div>

<!-- HISTORY MODAL -->
<div class="modal-overlay" id="history-modal" onclick="handleOverlayClick(event,'history-modal')">
  <div class="modal wide history-modal">
    <div class="modal-title">🗂️ 歷史紀錄 <button class="btn-modal-close" onclick="closeModal('history-modal')">✕</button></div>
    <div class="history-scroll" id="history-container"></div>
  </div>
</div>

<div class="main">
  <div class="card">
    <div class="card-title"><span>➕</span> 加落單</div>
    <div class="form-row stacked">
      <label for="name-input">你的名字</label>
      <input type="text" id="name-input" placeholder="" maxlength="20">
    </div>
    <div class="form-row stacked" style="margin-top:10px">
      <label for="url-input">HKTVmall 產品連結</label>
      <input type="url" id="url-input" placeholder="https://www.hktvmall.com/hktv/zh/...">
    </div>
    <div class="form-row" style="align-items:flex-end;margin-top:10px;margin-bottom:12px">
      <div style="flex:1"></div>
      <div>
        <label>數量</label>
        <div class="qty-wrap">
          <button class="qty-btn" onclick="changeQty(-1)">−</button>
          <input type="text" id="qty-input" value="1" readonly>
          <button class="qty-btn" onclick="changeQty(1)">+</button>
        </div>
      </div>
    </div>
    <button class="btn-add" id="add-btn" onclick="addOrder()">
      <span id="btn-text">🔍 搵產品資訊 &amp; 加落單</span>
    </button>
    <div class="loading-bar" id="loading-bar">
      <div class="spinner"></div>
      <span id="loading-text">正在抓取產品資訊...</span>
    </div>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <div class="summary-bar" id="summary-bar" style="display:none">
    <div>
      <div class="label">今期總金額</div>
      <div class="total" id="total-amount">HK$0</div>
    </div>
    <div class="summary-stats">
      <div class="stat"><div class="val" id="stat-items">0</div><div class="lbl">件產品</div></div>
      <div class="divider-v"></div>
      <div class="stat"><div class="val" id="stat-people">0</div><div class="lbl">位同事</div></div>
    </div>
  </div>

  <div id="orders-section" style="display:none">
    <div class="section-header">
      <div class="section-title">📋 落單紀錄</div>
      <div class="section-btns">
        <button class="btn-archive-round" onclick="openArchiveModal()">📦 結單存檔</button>

// ── SCRAPE HKTVMALL ──
async function fetchPageHtml(url) {
  for (const makeProxy of PROXIES) {
    try {
      const res = await fetch(makeProxy(url), { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;
      const html = await res.text();

      if (!html.includes('application/ld+json') && !html.includes('og:title') && !html.includes('data-price')) {
        const canon = html.match(/<link[^>]+rel=["']canonical["'][^>]+href=["']([^"']+)["']/i)
                   || html.match(/<meta[^>]+http-equiv=["']refresh["'][^>]+content=["'][^"']*url=([^"'\s]+)/i);
        if (canon && canon[1] && canon[1] !== url) {
          return await fetchPageHtml(canon[1]);
        }
        try {
          const aoRes = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`, { signal: AbortSignal.timeout(8000) });
          if (aoRes.ok) {
            const aoData = await aoRes.json();
            if (aoData.contents && (aoData.contents.includes('application/ld+json') || aoData.contents.includes('data-price'))) return aoData.contents;
            if (aoData.status?.url && aoData.status.url !== url) {
              return await fetchPageHtml(aoData.status.url);
            }
          }
        } catch {}
        continue;
      }
      return html;
    } catch {}
  }
  return null;
}

function parseProductFromHtml(html) {
  const result = { name: '', price: 0, image: '', brand: '', unit: '' };

  // ── NEW: HKTVmall data-attribute parsing (最可靠) ──
  const dataPrice = html.match(/data-price=["']\$?\s*([0-9]+\.?[0-9]*)["']/i);
  if (dataPrice) { const p = parseFloat(dataPrice[1]); if (p > 0) result.price = p; }

  const dataBrand = html.match(/data-tBrand=["']([^"']+)["']/i);
  if (dataBrand) result.brand = dataBrand[1];

  const dataName = html.match(/data-tName=["']([^"']+)["']/i);
  if (dataName) result.name = dataName[1];
  // ── END NEW ──

  const ldMatches = [...html.matchAll(/<script[^>]+type=["']application\/ld\+json["'][^>]*>([\s\S]*?)<\/script>/gi)];
  for (const m of ldMatches) {
    try {
      const json = JSON.parse(m[1]);
      const items = Array.isArray(json) ? json : [json];
      for (const item of items) {
        const prod = item['@type'] === 'Product' ? item : item['@graph']?.find(x => x['@type'] === 'Product');
        if (!prod) continue;
        if (prod.name) result.name = prod.name;
        if (prod.brand?.name) result.brand = prod.brand.name;
        if (prod.image) result.image = Array.isArray(prod.image) ? prod.image[0] : prod.image;
        const offers = prod.offers;
        if (offers) {
          const offerList = Array.isArray(offers) ? offers : [offers];
          let best = Infinity;
          for (const offer of offerList) {
            const p = parseFloat(offer.lowPrice || offer.price || offer.highPrice || 0);
            if (p > 0 && p < best) best = p;
          }
          if (best === Infinity) best = 0;
          if (best > 0) result.price = best;
        }
        if (result.name && result.price > 0) return result;
      }
    } catch {}
  }

  const ogTitle = html.match(/<meta[^>]+property=["']og:title["'][^>]+content=["']([^"']+)["']/i) || html.match(/<meta[^>]+content=["']([^"']+)["'][^>]+property=["']og:title["']/i);
  if (ogTitle && !result.name) result.name = ogTitle[1].replace(/\s*[-|].*$/, '').trim();
  const ogImage = html.match(/<meta[^>]+property=["']og:image["'][^>]+content=["']([^"']+)["']/i) || html.match(/<meta[^>]+content=["']([^"']+)["'][^>]+property=["']og:image["']/i);
  if (ogImage && !result.image) result.image = ogImage[1];

  if (result.price === 0) {
    for (const pat of [
      /itemprop=["']price["'][^>]*content=["']([0-9]+\.?[0-9]*)["']/i,
      /"price"\s*:\s*"?([0-9]+\.?[0-9]*)"?/,
      /HK\$\s*([0-9]+\.[0-9]{2})/,
      /data-price=["']\$?\s*([0-9]+\.?[0-9]*)["']/i,
      /"value"\s*:\s*"?([0-9]+\.?[0-9]*)"?\s*,\s*"priceType"/,
      /"formattedValue"\s*:\s*"\$\s*([0-9]+\.?[0-9]*)"/
    ]) {
      const m = html.match(pat);
      if (m) { const p = parseFloat(m[1]); if (p > 0) { result.price = p; break; } }
    }
  }
  return result;
}

async function enrichWithGemini(url, partial) {
  const key = getKey();
  if (!key) return partial;
  const missing = [];
  if (!partial.name) missing.push('name');
  if (!partial.price) missing.push('price (HKD數字)');
  if (!partial.image) missing.push('image URL');
  if (missing.length === 0) return partial;
  const prompt = `HKTVmall產品：${url}\n已知：名稱=${partial.name||'未知'} 價格=${partial.price||'未知'}\n請用Google Search搵缺少資訊：${missing.join(', ')}\n只回覆JSON：{"name":"${partial.name||''}","price":${partial.price||0},"unit":"","image":"${partial.image||''}","brand":"${partial.brand||''}"}`;
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ tools:[{google_search:{}}], contents:[{role:'user',parts:[{text:prompt}]}], generationConfig:{temperature:0.1,maxOutputTokens:500} })
    });
    if (!res.ok) return partial;
    const data = await res.json();
    const text = data.candidates?.[0]?.content?.parts?.filter(p=>p.text)?.map(p=>p.text)?.join('') || '';
    const m = text.match(/\{[\s\S]*?\}/);
    if (!m) return partial;
    const g = JSON.parse(m[0].replace(/```json|```/g,'').trim());
    return { name:partial.name||g.name||'', price:partial.price||g.price||0, image:partial.image||g.image||'', brand:partial.brand||g.brand||'', unit:partial.unit||g.unit||'' };
  } catch { return partial; }
}

async function fetchProductInfo(url) {
  setLoadingText('正在抓取產品頁面...');
  const html = await fetchPageHtml(url);
  let product = { name:'', price:0, image:'', brand:'', unit:'' };
  if (html) product = parseProductFromHtml(html);
  if (!product.name || !product.price) {
    setLoadingText('補充產品資訊中...');
    product = await enrichWithGemini(url, product);
  }
  if (!product.name) throw new Error('未能取得產品資訊，請確認連結正確');
  return product;
}

async function addOrder() {
  const name = document.getElementById('name-input').value.trim();
  const url  = document.getElementById('url-input').value.trim();
  document.getElementById('error-msg').className = 'error-msg';
  if (!name) return showError('請先輸入你的名字 👤');
  if (!url)  return showError('請貼上 HKTVmall 產品連結 🔗');
  if (!url.includes('hktvmall')) return showError('請貼上正確嘅 HKTVmall 連結');
  setLoading(true);
  try {
    const product = await fetchProductInfo(url);
    const existing = orders.find(o => o.person_name === name && o.url === url);
    if (existing) {
      const newQty = existing.qty + qty;
      const { error } = await db.from('drink_orders').update({ qty: newQty }).eq('id', existing.id);
      if (error) throw new Error('更新失敗：' + error.message);
      showToast(`✅ 數量更新為 ×${newQty}！`);
    } else {
      const { error } = await db.from('drink_orders').insert({ person_name: name, product, qty, url });
      if (error) throw new Error('儲存失敗：' + error.message);
      showToast('✅ 已加落單！');
    }
    document.getElementById('url-input').value = '';
    qty = 1; document.getElementById('qty-input').value = 1;
    await loadOrders();
  } catch(e) { showError(e.message); }
  finally { setLoading(false); }
}

    return;
  }

function renderArchiveCard(a) {
  const date = new Date(a.created_at).toLocaleDateString('zh-HK', { year:'numeric', month:'long', day:'numeric' });
  const archiveOrders = a.orders || [];
  const people = [...new Set(archiveOrders.map(o => o.person_name))];
  return `
    <div class="archive-card" id="arc-${a.id}">
      <div class="archive-card-header">
        <div>
          <div class="archive-name">${escHtml(a.round_name)}</div>
          <div class="archive-date">📅 ${date}</div>
        </div>
        <div class="archive-right">
          <div class="archive-total">HK$${Number(a.total||0).toFixed(1)}</div>
          <div class="archive-meta">${people.length} 人・${archiveOrders.length} 件</div>
        </div>
      </div>
      <div class="archive-actions">
        <button class="btn-archive-expand" onclick="toggleArchiveDetail(${a.id})">📋 展開明細</button>
        <button class="btn-archive-del" onclick="deleteArchive(${a.id}, '${escHtml(a.round_name)}')">🗑️ 刪除</button>
      </div>
      <div class="archive-detail" id="arc-detail-${a.id}">
        ${renderArchiveDetail(archiveOrders)}
      </div>
    </div>`;
}

function renderArchiveDetail(archiveOrders) {
  const byPerson = {}, personOrder = [];
  for (const o of archiveOrders) {
    if (!byPerson[o.person_name]) { byPerson[o.person_name] = []; personOrder.push(o.person_name); }
    byPerson[o.person_name].push(o);
  }
  return personOrder.map(person => {
    const pOrders = byPerson[person];
    const sub = pOrders.reduce((s,o) => s+(o.product.price||0)*o.qty, 0);
    return `<div class="archive-person-name">👤 ${escHtml(person)}</div>
      ${pOrders.map(o => `<div class="archive-item-row">• ${escHtml(o.product.name||'未知')} × ${o.qty}${o.product.price ? ` (HK$${((o.product.price||0)*o.qty).toFixed(1)})` : ''}</div>`).join('')}
      <div class="archive-person-sub">小計：HK$${sub.toFixed(1)}</div>`;
  }).join('');
}

function toggleArchiveDetail(id) {
  const el = document.getElementById(`arc-detail-${id}`);
  const btn = el.previousElementSibling.querySelector('.btn-archive-expand');
  el.classList.toggle('open');
  btn.textContent = el.classList.contains('open') ? '📋 收起明細' : '📋 展開明細';
}

async function deleteArchive(id, name) {
  const ok = await showConfirm({ icon:'🗑️', msg:'刪除存檔？', sub:`「${name}」將會永久刪除`, okLabel:'確定刪除' });
  if (!ok) return;
  await db.from('order_archives').delete().eq('id', id);
  document.getElementById(`arc-${id}`)?.remove();
  const container = document.getElementById('history-container');
  if (!container.querySelector('.archive-card')) {
    container.innerHTML = '<div class="history-empty"><div class="emoji">📭</div><div>未有存檔紀錄</div></div>';
  }
  showToast('🗑️ 已刪除存檔');
}

// ── RENDER ──
const COLORS = ['color-0','color-1','color-2','color-3','color-4','color-5','color-6','color-7'];

function render() {
  const container = document.getElementById('orders-container');
  const emptyState = document.getElementById('empty-state');
  const ordersSection = document.getElementById('orders-section');
  const summaryBar = document.getElementById('summary-bar');
  if (orders.length === 0) {
    emptyState.style.display='block'; ordersSection.style.display='none'; summaryBar.style.display='none'; return;
  }
  emptyState.style.display='none'; ordersSection.style.display='block'; summaryBar.style.display='flex';

  const byPerson={}, personOrder=[], personIndex={};
  let colorIdx=0;
  for (const o of orders) {
    if (!byPerson[o.person_name]) { byPerson[o.person_name]=[]; personOrder.push(o.person_name); personIndex[o.person_name]=colorIdx++%COLORS.length; }
    byPerson[o.person_name].push(o);
  }
  let grandTotal=0, totalItems=0;
  for (const o of orders) { grandTotal+=(o.product.price||0)*o.qty; totalItems+=o.qty; }
  document.getElementById('total-amount').textContent='HK$'+grandTotal.toFixed(1);
  document.getElementById('stat-items').textContent=totalItems;
  document.getElementById('stat-people').textContent=personOrder.length;

  container.innerHTML='';
  for (const person of personOrder) {
    const pOrders=byPerson[person];
    const subtotal=pOrders.reduce((s,o)=>s+(o.product.price||0)*o.qty,0);
    const group=document.createElement('div');
    group.className='person-group';
    group.innerHTML=`
      <div class="person-header">
        <div class="avatar ${COLORS[personIndex[person]]}">${escHtml(person.charAt(0).toUpperCase())}</div>
        <div class="person-name">${escHtml(person)}</div>
        <div class="person-subtotal">HK$${subtotal.toFixed(1)}</div>
      </div>
      ${pOrders.map(o=>renderItem(o)).join('')}`;
    container.appendChild(group);
  }
}

function renderItem(o) {
  const p=o.product, lineTotal=(p.price||0)*o.qty;
  const imgHtml=p.image
    ?`<img class="item-img" src="${escHtml(p.image)}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="img-placeholder" style="display:none">🧃</div>`
    :`<div class="img-placeholder">🧃</div>`;
  const nameSnippet = (p.name||'未知產品').slice(0,40);
  return `
    <div class="item-card">
      ${imgHtml}
      <div class="item-info">
        <div class="item-name">${escHtml(p.name||'未知產品')}</div>
        <div class="item-meta">
          <span class="item-price">${p.price?'HK$'+p.price:'價格未知'}</span>
          <span class="item-qty-badge">× ${o.qty}${p.unit||''}</span>
          ${o.qty>1?`<span class="item-total">= HK$${lineTotal.toFixed(1)}</span>`:''}
        </div>
        <div style="margin-top:4px">
          <a class="item-link" href="${escHtml(o.url)}" target="_blank">🔗 HKTVmall</a>
          ${p.brand?`<span style="font-size:11px;color:#aaa;margin-left:8px">${escHtml(p.brand)}</span>`:''}
        </div>
      </div>
      <button class="btn-remove" onclick="removeOrder(${o.id},'${escHtml(nameSnippet)}')" title="移除">✕</button>
    </div>`;
}

function copyList() {
  const byPerson={},personOrder=[];
  for (const o of orders) {
    if (!byPerson[o.person_name]) { byPerson[o.person_name]=[]; personOrder.push(o.person_name); }
    byPerson[o.person_name].push(o);
  }
  let text='🧃 飲品團購清單\n━━━━━━━━━━━━━━━━━━━━\n',grand=0;
  for (const person of personOrder) {
    text+=`\n👤 ${person}\n`;
    for (const o of byPerson[person]) {
      const line=(o.product.price||0)*o.qty; grand+=line;
      text+=`  • ${o.product.name||'未知'} × ${o.qty}`;
      if (o.product.price) text+=` (HK$${line.toFixed(1)})`;
      text+='\n';
    }
    text+=`  小計：HK$${byPerson[person].reduce((s,o)=>s+(o.product.price||0)*o.qty,0).toFixed(1)}\n`;
  }
  text+=`\n━━━━━━━━━━━━━━━━━━━━\n💰 總計：HK$${grand.toFixed(1)}\n`;
  navigator.clipboard.writeText(text).then(()=>showToast('📋 已複製到剪貼板！'));
}

function setLoading(on) {
  document.getElementById('add-btn').disabled=on;
  document.getElementById('btn-text').textContent=on?'搜尋緊...':'🔍 搵產品資訊 & 加落單';
  document.getElementById('loading-bar').className='loading-bar'+(on?' show':'');
  if (!on) document.getElementById('loading-text').textContent='正在抓取產品資訊...';
}
function setLoadingText(t){document.getElementById('loading-text').textContent=t;}
function showError(msg){const el=document.getElementById('error-msg');el.innerHTML='⚠️ '+msg;el.className='error-msg show';}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show';setTimeout(()=>t.className='toast',2500);}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

document.addEventListener('DOMContentLoaded', () => {
  const savedName = localStorage.getItem('user_name') || '';
  if (savedName) document.getElementById('name-input').value = savedName;

  document.getElementById('name-input').addEventListener('input', () => {
    const val = document.getElementById('name-input').value.trim();
    if (val) localStorage.setItem('user_name', val);
  });

  document.getElementById('url-input').addEventListener('keydown', e=>{if(e.key==='Enter')addOrder();});
  document.getElementById('api-key-input').addEventListener('keydown', e=>{if(e.key==='Enter')saveKey();});
  document.getElementById('archive-name-input').addEventListener('keydown', e=>{if(e.key==='Enter')saveArchive();});
  updateKeyIndicator();
  loadOrders();
  startSync();
});
</script>
</body>
</html>
